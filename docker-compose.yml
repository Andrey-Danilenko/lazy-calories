services:
  db:
    image: postgres:17-alpine
    container_name: lazy-calories-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lazy
      POSTGRES_PASSWORD: lazy
      POSTGRES_DB: lazycalories
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lazy -d lazycalories"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lazy-calories-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ""
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    image: lazy-calories:latest
    container_name: lazy-calories
    restart: unless-stopped
    env_file: .env
    environment:
      # Override the localhost URL from .env: inside the compose network Postgres is "db".
      DATABASE_URL: postgresql+asyncpg://lazy:lazy@db:5432/lazycalories
      # Use external Qdrant server instead of embedded
      QDRANT_URL: http://qdrant:6333
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  pg_data:
  qdrant_data:
